<!DOCTYPE html>
<html>
<head>
    <title>Audio Codec Support Test</title>
</head>
<body>
    <h1>Audio Codec Support Test</h1>
    <div id="results"></div>
    
    <script>
        const codecs = [
            'audio/mp4;codecs=mp4a.40.2',  // AAC-LC
            'audio/mp4;codecs=mp4a.40.5',  // AAC-HE
            'audio/mp4',                   // MP4 generic
            'audio/mpeg',                  // MP3
            'audio/wav',                   // WAV
            'audio/webm;codecs=opus',      // WebM Opus
            'audio/webm;codecs=vorbis',    // WebM Vorbis
            'audio/ogg;codecs=opus',       // OGG Opus
        ];
        
        const results = document.getElementById('results');
        
        codecs.forEach(codec => {
            const supported = MediaRecorder.isTypeSupported(codec);
            const div = document.createElement('div');
            div.innerHTML = `<strong>${codec}</strong>: ${supported ? '✅ Supported' : '❌ Not supported'}`;
            div.style.color = supported ? 'green' : 'red';
            div.style.marginBottom = '8px';
            results.appendChild(div);
        });
        
        // Test browser info
        const browserDiv = document.createElement('div');
        browserDiv.innerHTML = `<br><strong>Browser:</strong> ${navigator.userAgent}`;
        browserDiv.style.marginTop = '20px';
        results.appendChild(browserDiv);
    </script>
</body>
</html>
